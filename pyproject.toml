[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "tests", "eval"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]  # assert is the point of tests

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q --strict-markers"
markers = [
    "live: tests that call real external APIs (deselected by default in CI)",
]
